version: "3.8"
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - xpack.monitoring.collection.enabled=false
      - xpack.ml.enabled=false
      - xpack.watcher.enabled=false
      - ES_JAVA_OPTS=-Xms4g -Xmx4g
      - bootstrap.memory_lock=true
      - indices.memory.index_buffer_size=20%
      - thread_pool.search.queue_size=2000
      - thread_pool.write.queue_size=2000
    mem_limit: 8g
    memswap_limit: 8g
    mem_swappiness: 0
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - elastic
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=${ES_HOST:-http://elasticsearch:9200}
      - ELASTICSEARCH_SERVICEACCOUNTTOKEN=${KIBANA_TOKEN}
      - xpack.security.enabled=true
    mem_limit: 1g
    ports:
      - "5601:5601"
    networks:
      - elastic
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pcap-api:
    image: pcap-api:latest
    container_name: pcap-api
    environment:
      - ES_HOST=http://elasticsearch:9200
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - CEPH_RGW_ENDPOINT=http://ceph-rgw:7480
      - RGW_ACCESS_KEY=${RGW_ACCESS_KEY}
      - RGW_SECRET_KEY=${RGW_SECRET_KEY}
      - RGW_REGION=${RGW_REGION:-us-east-1}
    mem_limit: 3g
    mem_reservation: 2g
    cpus: "1.5"
    ports:
      - "5000:5000"
    depends_on:
      - elasticsearch
    networks:
      - elastic
      - ceph-net
      - sinkhole-u_keycloak_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
volumes:
  elasticsearch-data:
networks:
  elastic:
    driver: bridge
  ceph-net:
    external: true
  sinkhole-u_keycloak_network:
    external: true